name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # 🚀 USE A PRE-BUILT CONTAINER: This environment includes all working Android tool chains pre-installed
    container:
      image: ghcr.io/kivy/buildozer:master

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App with Buildozer
        run: |
          # Safe workspace permission adjustment for container isolation
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          buildozer android debug
        id: build

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: BLP-Cyber-Pong
          path: bin/*.apk
